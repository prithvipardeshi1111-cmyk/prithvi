<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2D Force Resultant Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 16px;
    }

    h2 {
      text-align: center;
      color: #222;
      margin-bottom: 4px;
    }

    p.subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 16px;
      font-size: 13px;
    }

    /* Main layout */
    .container {
      display: flex;
      gap: 16px;
      max-width: 1100px;
      margin: auto;
      align-items: flex-start;
    }

    /* Left: inputs */
    .left {
      width: 340px;
      flex-shrink: 0;
    }

    /* Force input card */
    .force-card {
      background: white;
      border: 2px solid #ccc;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .force-card h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .force-card label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-top: 8px;
      margin-bottom: 2px;
    }

    .force-card input {
      width: 100%;
      padding: 6px;
      border: 1px solid #bbb;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }

    .row2 {
      display: flex;
      gap: 8px;
    }

    .row2 > div { flex: 1; }

    /* Buttons */
    .remove-btn {
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 3px 10px;
      cursor: pointer;
      font-size: 12px;
    }

    .add-btn, .calc-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .add-btn  { background: #27ae60; color: white; }
    .calc-btn { background: #2980b9; color: white; }

    button:hover { opacity: 0.88; }

    /* Right: canvas + results */
    .right {
      flex: 1;
    }

    canvas {
      background: white;
      border: 2px solid #ccc;
      border-radius: 8px;
      display: block;
      width: 100%;
    }

    /* Results box */
    #results {
      background: white;
      border: 2px solid #ccc;
      border-radius: 8px;
      padding: 14px;
      margin-top: 12px;
      font-size: 13px;
      line-height: 1.9;
    }

    #results h4 {
      margin: 0 0 8px 0;
      font-size: 15px;
      color: #222;
      border-bottom: 1px solid #ddd;
      padding-bottom: 4px;
    }

    .section-title {
      font-weight: bold;
      color: #333;
      margin-top: 10px;
      display: block;
    }

    .concurrent    { color: green; font-weight: bold; font-size: 15px; }
    .nonconcurrent { color: red;   font-weight: bold; font-size: 15px; }
    .resultant-val { color: #2980b9; font-weight: bold; }
    .eq            { font-family: 'Courier New', monospace; background: #f5f5f5; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>

<h2>2D Force Resultant Calculator</h2>
<p class="subtitle">Concurrent &amp; Non-Concurrent Forces | y = bx + c method</p>

<div class="container">

  <div class="left">
    <div id="force-list"></div>
    <button class="add-btn"  onclick="addForce()">+ Add Another Force</button>
    <button class="calc-btn" onclick="calculate()">Calculate Resultant</button>
  </div>

  <div class="right">
    <canvas id="myCanvas" width="680" height="400"></canvas>
    <div id="results">
      <h4>Results</h4>
      <p style="color:#888">Add forces and click Calculate.</p>
    </div>
  </div>

</div>

<script>
// =============================================================
//  PART 1 — FORCE INPUT MANAGEMENT
// =============================================================

var forces  = [];   // array of force objects
var idCount = 0;    // unique id counter

// Color for each force
var COLORS = ["#e74c3c","#2980b9","#27ae60","#f39c12","#8e44ad","#16a085","#c0392b","#1abc9c"];

function addForce() {
  idCount++;
  var id    = idCount;
  var color = COLORS[(id - 1) % COLORS.length];
  forces.push({ id: id, color: color });

  var card = document.createElement("div");
  card.className  = "force-card";
  card.id          = "card_" + id;
  card.style.borderColor = color;

  card.innerHTML =
    '<h3 style="color:' + color + '">Force F<sub>' + id + '</sub>' +
      '<button class="remove-btn" onclick="removeForce(' + id + ')">Remove</button>' +
    '</h3>' +

    // Initial point (x0, y0)
    '<label>Initial Point</label>' +
    '<div class="row2">' +
      '<div><label>x₀</label><input type="number" id="px_'+id+'" placeholder="0" value="0"></div>' +
      '<div><label>y₀</label><input type="number" id="py_'+id+'" placeholder="0" value="0"></div>' +
    '</div>' +

    // Magnitude
    '<label>Magnitude |F| (N)</label>' +
    '<input type="number" id="mag_'+id+'" placeholder="e.g. 100">' +

    // Direction cosine l = cos(angle with x-axis)
    '<label>Direction Cosine  l = cos α  (value between -1 and 1)</label>' +
    '<input type="number" id="l_'+id+'" placeholder="e.g. 0.6" step="0.01" min="-1" max="1">';

  document.getElementById("force-list").appendChild(card);
}

function removeForce(id) {
  forces = forces.filter(function(f){ return f.id !== id; });
  var card = document.getElementById("card_" + id);
  if (card) card.remove();
}

// Read one force's values from the DOM
function readForce(f) {
  return {
    id:    f.id,
    color: f.color,
    px:    parseFloat(document.getElementById("px_"  + f.id).value) || 0,
    py:    parseFloat(document.getElementById("py_"  + f.id).value) || 0,
    mag:    parseFloat(document.getElementById("mag_" + f.id).value),
    l:     parseFloat(document.getElementById("l_"   + f.id).value),
  };
}

// =============================================================
//  PART 2 — MATH HELPERS
// =============================================================

// Round to d decimal places
function r(n, d) {
  d = d === undefined ? 4 : d;
  return isNaN(n) ? "?" : Number(n.toFixed(d));
}

// Format number with sign  e.g.  +3.5  or  -2.1
function fs(n, d) {
  return (n >= 0 ? "+" : "") + r(n, d === undefined ? 3 : d);
}

function buildLine(f) {
  var l   = f.l;
  var x0  = f.px;
  var y0  = f.py;

  if (Math.abs(l) < 1e-9) {
    return { type: "vertical", x: x0 };
  }

  if (Math.abs(Math.abs(l) - 1) < 1e-9) {
    return { type: "horizontal", y: y0 };
  }

  var sinA = Math.sqrt(1 - l*l);
  var b    = sinA / l;
  var c    = y0 - b * x0;
  return { type: "normal", b: b, c: c };
}

function solveTwo(eq1, eq2) {
  if (eq1.type === "vertical" && eq2.type === "vertical") {
    return eq1.x === eq2.x ? { type: "infinite" } : { type: "none" };
  }
  if (eq1.type === "horizontal" && eq2.type === "horizontal") {
    return eq1.y === eq2.y ? { type: "infinite" } : { type: "none" };
  }
  if (eq1.type === "vertical") {
    var x = eq1.x;
    var y = eq2.type === "horizontal" ? eq2.y : eq2.b * x + eq2.c;
    return { type: "point", x: x, y: y };
  }
  if (eq2.type === "vertical") {
    var x = eq2.x;
    var y = eq1.type === "horizontal" ? eq1.y : eq1.b * x + eq1.c;
    return { type: "point", x: x, y: y };
  }
  if (eq1.type === "horizontal" && eq2.type === "normal") {
    var y = eq1.y;
    var x = (y - eq2.c) / eq2.b;
    return { type: "point", x: x, y: y };
  }
  if (eq2.type === "horizontal" && eq1.type === "normal") {
    var y = eq2.y;
    var x = (y - eq1.c) / eq1.b;
    return { type: "point", x: x, y: y };
  }

  var det = eq2.b - eq1.b;
  if (Math.abs(det) < 1e-9) {
    return Math.abs(eq1.c - eq2.c) < 1e-6 ? { type: "infinite" } : { type: "none" };
  }

  var x = (eq1.c - eq2.c) / det;
  var y = eq1.b * x + eq1.c;
  return { type: "point", x: x, y: y };
}

// =============================================================
//  PART 3 — MAIN CALCULATE FUNCTION
// =============================================================

function calculate() {

  var list = forces.map(readForce);

  list = list.filter(function(f){
    return !isNaN(f.mag) && !isNaN(f.l) && Math.abs(f.l) <= 1;
  });

  if (list.length === 0) {
    document.getElementById("results").innerHTML =
      "<h4>Results</h4><p style='color:red'>Please fill in valid values for all forces.</p>";
    return;
  }

  var equations = list.map(function(f) {
    return buildLine(f);
  });

  list.forEach(function(f) {
    f.Fx = f.mag * f.l;
    f.Fy = f.mag * Math.sqrt(1 - f.l * f.l);
  });

  // --- Step 4: Check concurrency (FIXED) ---
  var concurrent = false;
  var commonPoint = null;
  var pairLog = []; 

  if (list.length === 1) {
    concurrent = true;
    commonPoint = { x: list[0].px, y: list[0].py };
  } else if (list.length >= 2) {
    var firstSol = solveTwo(equations[0], equations[1]);
    
    if (firstSol.type === "point") {
      var candidate = firstSol;
      var allMatch = equations.every(function(eq) {
        if (eq.type === "vertical") {
          return Math.abs(candidate.x - eq.x) < 0.01;
        } else if (eq.type === "horizontal") {
          return Math.abs(candidate.y - eq.y) < 0.01;
        } else {
          var expectedY = eq.b * candidate.x + eq.c;
          return Math.abs(candidate.y - expectedY) < 0.01;
        }
      });

      if (allMatch) {
        concurrent = true;
        commonPoint = candidate;
      }
    } else if (firstSol.type === "infinite") {
      concurrent = true;
      commonPoint = { x: list[0].px, y: list[0].py };
    }

    // Populate pairLog for display
    for (var i = 0; i < equations.length; i++) {
      for (var j = i + 1; j < equations.length; j++) {
        pairLog.push({ i: i, j: j, sol: solveTwo(equations[i], equations[j]) });
      }
    }
  }

  var sumFx = list.reduce(function(s,f){ return s + f.Fx; }, 0);
  var sumFy = list.reduce(function(s,f){ return s + f.Fy; }, 0);
  var Rmag  = Math.sqrt(sumFx*sumFx + sumFy*sumFy);
  var Rangle = Math.atan2(sumFy, sumFx) * 180 / Math.PI;

  draw(list, equations, concurrent, commonPoint, sumFx, sumFy, Rmag, Rangle);

  var eqHTML = "";
  list.forEach(function(f, i) {
    var eq = equations[i];
    var eqStr;
    if (eq.type === "vertical")   eqStr = "x = " + r(eq.x, 3);
    else if (eq.type === "horizontal") eqStr = "y = " + r(eq.y, 3);
    else eqStr = "y = " + r(eq.b, 4) + "x " + fs(eq.c, 4);

    eqHTML += "<span style='color:" + f.color + "'><b>F" + (i+1) + ":</b></span> " +
              "<span class='eq'>" + eqStr + "</span>  " +
              "(slope b=" + r(eq.b || 0, 4) + ", intercept c=" + r(eq.c || 0, 4) + ")<br>";
  });

  var pairHTML = "";
  pairLog.forEach(function(p) {
    var s = p.sol;
    var desc = s.type === "point"    ? "Intersection: (" + r(s.x,3) + ", " + r(s.y,3) + ")" :
               s.type === "infinite" ? "Same line (infinite solutions)" :
                                       "Parallel (no solution)";
    pairHTML += "F" + (p.i+1) + " &amp; F" + (p.j+1) + " → " + desc + "<br>";
  });

  var compHTML = "<table style='border-collapse:collapse;font-size:13px;margin-top:4px'>" +
    "<tr style='background:#eee'><th style='padding:4px 10px'>Force</th>" +
    "<th style='padding:4px 10px'>Fx = F·l</th>" +
    "<th style='padding:4px 10px'>Fy = F·√(1−l²)</th></tr>";
  list.forEach(function(f, i) {
    compHTML += "<tr><td style='padding:4px 10px;color:" + f.color + "'><b>F" + (i+1) + "</b></td>" +
      "<td style='padding:4px 10px;text-align:right'>" + r(f.Fx,3) + " N</td>" +
      "<td style='padding:4px 10px;text-align:right'>" + r(f.Fy,3) + " N</td></tr>";
  });
  compHTML += "<tr style='background:#eef;font-weight:bold'>" +
    "<td style='padding:4px 10px'>Σ</td>" +
    "<td style='padding:4px 10px;text-align:right'>" + r(sumFx,3) + " N</td>" +
    "<td style='padding:4px 10px;text-align:right'>" + r(sumFy,3) + " N</td></tr></table>";

  document.getElementById("results").innerHTML =
    "<h4>Results</h4>" +
    "<span class='section-title'>Line Equations (y = bx + c):</span>" +
    eqHTML +
    "<span class='section-title'>Pair Intersection Check:</span>" +
    pairHTML +
    "<span class='section-title'>Concurrency:</span>" +
    (concurrent
      ? "<span class='concurrent'>✓ CONCURRENT</span>" +
        (commonPoint ? " — Common point: (" + r(commonPoint.x,3) + ", " + r(commonPoint.y,3) + ")" : "")
      : "<span class='nonconcurrent'>✗ NON-CONCURRENT</span> — No single common point exists.") +
    "<br><br>" +
    "<span class='section-title'>Force Components:</span>" +
    compHTML +
    "<span class='section-title'>Resultant:</span>" +
    "|R| = √(" + r(sumFx,2) + "² + " + r(sumFy,2) + "²) = " +
    "<span class='resultant-val'>" + r(Rmag,4) + " N</span><br>" +
    "θ = tan⁻¹(" + r(sumFy,3) + " / " + r(sumFx,3) + ") = " +
    "<span class='resultant-val'>" + r(Rangle,3) + "°</span>";
}

// =============================================================
//  PART 4 — 2D CANVAS DRAWING
// =============================================================

function draw(list, equations, concurrent, commonPoint, sumFx, sumFy, Rmag, Rangle) {
  var canvas = document.getElementById("myCanvas");
  var ctx    = canvas.getContext("2d");
  var W      = canvas.width;
  var H      = canvas.height;

  ctx.clearRect(0, 0, W, H);

  var allX = list.map(function(f){ return f.px; });
  var allY = list.map(function(f){ return f.py; });
  if (commonPoint) { allX.push(commonPoint.x); allY.push(commonPoint.y); }
  allX.push(0); allY.push(0);

  var minX = Math.min.apply(null, allX) - 3;
  var maxX = Math.max.apply(null, allX) + 3;
  var minY = Math.min.apply(null, allY) - 3;
  var maxY = Math.max.apply(null, allY) + 3;

  var span = Math.max(maxX - minX, maxY - minY);
  var midX = (minX + maxX) / 2;
  var midY = (minY + maxY) / 2;
  minX = midX - span/2;  maxX = midX + span/2;
  minY = midY - span/2;  maxY = midY + span/2;

  var pad = 40;

  function toCanvas(wx, wy) {
    var cx = pad + (wx - minX) / (maxX - minX) * (W - 2*pad);
    var cy = H - pad - (wy - minY) / (maxY - minY) * (H - 2*pad);
    return { x: cx, y: cy };
  }

  ctx.strokeStyle = "#e0e0e0";
  for (var gx = Math.ceil(minX); gx <= maxX; gx++) {
    var p1 = toCanvas(gx, minY), p2 = toCanvas(gx, maxY);
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
  }
  for (var gy = Math.ceil(minY); gy <= maxY; gy++) {
    var p1 = toCanvas(minX, gy), p2 = toCanvas(maxX, gy);
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
  }

  ctx.strokeStyle = "#999";
  var ax1 = toCanvas(minX, 0), ax2 = toCanvas(maxX, 0);
  ctx.beginPath(); ctx.moveTo(ax1.x, ax1.y); ctx.lineTo(ax2.x, ax2.y); ctx.stroke();
  var ay1 = toCanvas(0, minY), ay2 = toCanvas(0, maxY);
  ctx.beginPath(); ctx.moveTo(ay1.x, ay1.y); ctx.lineTo(ay2.x, ay2.y); ctx.stroke();

  equations.forEach(function(eq, i) {
    var f = list[i];
    var p1, p2;
    if (eq.type === "vertical") { p1 = toCanvas(eq.x, minY); p2 = toCanvas(eq.x, maxY); }
    else if (eq.type === "horizontal") { p1 = toCanvas(minX, eq.y); p2 = toCanvas(maxX, eq.y); }
    else { p1 = toCanvas(minX, eq.b * minX + eq.c); p2 = toCanvas(maxX, eq.b * maxX + eq.c); }
    ctx.strokeStyle = f.color;
    ctx.setLineDash([6, 4]);
    ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
    ctx.setLineDash([]);
  });

  var arrowScale = (W - 2*pad) / (maxX - minX) * 0.08;

  list.forEach(function(f, i) {
    var start = toCanvas(f.px, f.py);
    var sinA  = Math.sqrt(1 - f.l * f.l);
    var end   = toCanvas(f.px + f.l * arrowScale * f.mag/10, f.py + sinA * arrowScale * f.mag/10);
    drawArrow(ctx, start.x, start.y, end.x, end.y, f.color, 2);
    ctx.fillStyle = f.color;
    ctx.fillText("F" + (i+1), end.x + 4, end.y - 4);
    ctx.beginPath(); ctx.arc(start.x, start.y, 4, 0, 2*Math.PI); ctx.fill();
  });

  if (concurrent && commonPoint) {
    var cp = toCanvas(commonPoint.x, commonPoint.y);
    ctx.fillStyle = "#000"; ctx.strokeStyle = "#fff";
    ctx.beginPath(); ctx.arc(cp.x, cp.y, 7, 0, 2*Math.PI); ctx.fill(); ctx.stroke();
  }

  var Rl = Math.cos(Rangle * Math.PI / 180), Rs = Math.sin(Rangle * Math.PI / 180);
  var rStart = toCanvas(0,0), rEnd = toCanvas(Rl*arrowScale*Rmag/10, Rs*arrowScale*Rmag/10);
  drawArrow(ctx, rStart.x, rStart.y, rEnd.x, rEnd.y, "#00aa00", 3);
}

function drawArrow(ctx, x1, y1, x2, y2, color, width) {
  var angle = Math.atan2(y2 - y1, x2 - x1);
  var headLen = 10;
  ctx.strokeStyle = ctx.fillStyle = color;
  ctx.lineWidth = width || 2;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * Math.cos(angle - 0.4), y2 - headLen * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - headLen * Math.cos(angle + 0.4), y2 - headLen * Math.sin(angle + 0.4));
  ctx.closePath(); ctx.fill();
}

addForce();
addForce();
</script>
</body>
</html>
